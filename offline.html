<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline — Okata</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f7faf7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      color: #333;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.6rem;
      color: #2e7d32;
      margin-bottom: 0.75rem;
      text-align: center;
    }

    p {
      font-size: 1rem;
      color: #666;
      text-align: center;
      max-width: 320px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      padding: 0.85rem 2rem;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn:hover { background: #1b5e20; }

    .status {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="icon">📦</div>
  <h1>You're Offline</h1>
  <p>
    It looks like you lost your internet connection.
    Check your connection and try again.
  </p>
  <button class="btn" onclick="window.location.reload()">Try Again</button>
  <p class="status" id="status"></p>

  <script>
    // Auto-reload when connection is restored
    window.addEventListener('online', () => {
      document.getElementById('status').textContent = 'Connection restored! Reloading…';
      setTimeout(() => window.location.reload(), 1000);
    });

    // Show current status
    document.getElementById('status').textContent =
      navigator.onLine ? 'Connected' : 'No internet connection';
  </script>

</body>
</html>
